name: Build Forvia Console Windows

# 触发：手动运行 / 推送到 main / 推送 v* 标签（v* 标签会额外发布 Release）
on:
  workflow_dispatch:
    inputs:
      architecture:
        description: "Python/EXE architecture"
        required: true
        default: "x86"
        type: choice
        options:
          - x86
          - x64
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write                  # 允许工作流创建/更新 Release（发布 exe zip）

jobs:
  build:
    runs-on: windows-latest        # GitHub 托管的 Windows runner，本身就是 x64
    defaults:
      run:
        shell: pwsh
        # 若 AI-2.0 是仓库的子目录，把下一行的 working-directory 改成 ./AI-2.0
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (${{ github.event.inputs.architecture || 'x64' }})
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ github.event.inputs.architecture || 'x64' }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install -r web/forvia_label_v2/requirements.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install -r web/forvia_train_v2/requirements.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install pyinstaller
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm forvia_console.spec
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Zip the dist folder
        run: |
          $src = "dist/ForviaAI2Console"
          if (-not (Test-Path $src)) { throw "未找到打包产物 $src" }
          Compress-Archive -Path "$src/*" -DestinationPath "ForviaAI2Console-windows-${{ github.event.inputs.architecture || 'x64' }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForviaAI2Console-windows-${{ github.event.inputs.architecture || 'x64' }}
          path: ForviaAI2Console-windows-${{ github.event.inputs.architecture || 'x64' }}.zip
          retention-days: 30

      # 推送 v* 标签时，额外把 zip 作为 Release 附件发布
      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ForviaAI2Console-windows-${{ github.event.inputs.architecture || 'x64' }}.zip
