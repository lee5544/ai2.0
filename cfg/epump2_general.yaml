line_name: epump2
model:
  model_name: general
results_path: ./results/
database:
  label_records_db_path: ""
  tdms_root: ""
  manifest_path: ""
  configured: false
  last_operation: ''
data_root: ""
label_records_db_path: ""
data:
  line:
  - epump2
dataset:
  num_workers: 8
  data_root: ""
  label_records_db_path: ""
  manifest_path: ""
train:
  model_type: lgb
  train_mode: normal
  split_strategy: reference_in
  seed_runs: 10
  label_mapping:
    enable: true
    auto_mlabel: true
    extract_all_features: true
    groups:
    - weight: 1
      reasons:
      - reason: 正常
        sample: 2000
      - reason: 干扰
        sample: -1
      - reason: 边界
        sample: -1
    - weight: 1
      reasons:
      - reason: 传感器错误
        sample: -1
    - weight: 1
      reasons:
      - reason: 秒表
        sample: -1
    - weight: 1
      reasons:
      - reason: 摩擦
        sample: -1
      - reason: 摩擦acc
        sample: -1
      - reason: 杂音
        sample: -1
      - reason: 咬齿
        sample: -1
      - reason: 哒哒_咔咔
        sample: -1
    - weight: 1
      reasons:
      - reason: 震颤
        sample: -1
      - reason: 马达
        sample: -1
  class_weights:
    正常_干扰_边界: 1
    传感器错误: 1
    秒表: 1
    摩擦_摩擦acc_杂音_咬齿_哒哒_咔咔: 1
    震颤_马达: 1
  lgb_params:
    n_estimators: 100
    num_leaves: 20
    max_depth: -1
    learning_rate: 0.05
    min_child_samples: 20
    min_split_gain: 0
    reg_lambda: 5
    reg_alpha: 0.5
    subsample: 0.8
    subsample_freq: 1
    feature_fraction: 0.7
    random_state: 42
    n_jobs: -1
  xgb_params:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    min_child_weight: 5
    gamma: 1
    reg_lambda: 5
    reg_alpha: 0.5
    subsample: 0.8
    colsample_bytree: 0.7
    eval_metric: mlogloss
    tree_method: hist
    random_state: 42
    n_jobs: -1
  rf_params:
    n_estimators: 100
    max_depth: 8
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: 0.8
augmentation:
  input_folders: []
  methods:
  - white_noise
  - random_crop
  - random_add_segment
  - random_amplitude
  - random_time_stretch
  output_dir: ./results/epump2_general/dataset_csv
