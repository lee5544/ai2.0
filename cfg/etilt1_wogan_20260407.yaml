line_name: etilt1
model:
  model_name: wogan_20260407
results_path: ./results/
data:
  reference:
  - etilt1/3863776
  - etilt1/3863777
  - etilt1/3863790
train:
  model_type: xgb
  train_mode: normal
  split_strategy: reference_in
  label_mapping:
    enable: true
    auto_mlabel: true
    groups:
    - reasons:
      - reason: 正常
        sample: 10000
      - reason: 干扰
        sample: -1
      - reason: 边界
        sample: -1
    - reasons:
      - reason: 摩擦
        sample: -1
      - reason: 摩擦acc
        sample: -1
      - reason: 杂音
        sample: -1
    - reasons:
      - reason: 震颤
        sample: -1
      - reason: 马达
        sample: -1
    - reasons:
      - reason: 传感器错误
        sample: -1
  seed_runs: 10
