line_name: epump2
model:
  model_name: general_0319
results_path: ./results/
data:
  folders:
  - epump2/20260319
  - epump2/20260319-kesu
  - epump2/ep2-20250825
  - epump2/ep2-20251127
  - epump2/ep2-20251226
  - epump2/ep2-20260206
  - epump4/ep4-1000pcs-NOK
train:
  model_type: xgb
  train_mode: normal
  split_strategy: reference_out
  label_mapping:
    enable: true
    auto_mlabel: true
    groups:
    - reasons:
      - reason: 正常
        sample: -1
      - reason: 干扰
        sample: -1
      - reason: 边界
        sample: -1
    - reasons:
      - reason: 摩擦
        sample: -1
      - reason: 摩擦acc
        sample: -1
      - reason: 杂音
        sample: -1
    - reasons:
      - reason: 震颤
        sample: -1
      - reason: 马达
        sample: -1
    - reasons:
      - reason: 传感器错误
        sample: -1
    - reasons:
      - reason: 秒表
        sample: -1
    - reasons:
      - reason: 咬齿
        sample: -1
