line_name: epump2
model:
  model_name: demo
results_path: ./results/
database:
  label_records_db_path: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/metadata/label_records.db
  tdms_root: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/factory_raw
  manifest_path: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/metadata/tdms_manifest.csv
  configured: true
  last_operation: refresh
  data_root: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/
data_root: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root
label_records_db_path: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/metadata/label_records.db
data:
  key_sns: []
  line:
  - epump2
dataset:
  num_workers: 8
  data_root: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root
  label_records_db_path: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/metadata/label_records.db
  manifest_path: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/metadata/tdms_manifest.csv
  tdms_root: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/factory_raw
train:
  model_type: lgb
  train_mode: normal
  split_strategy: reference_in
  seed_runs: 1
  label_mapping:
    enable: true
    auto_mlabel: true
    extract_all_features: true
    groups:
    - weight: 1
      reasons:
      - reason: 正常
        sample: -1
    - weight: 1
      reasons:
      - reason: 传感器错误
        sample: -1
    - weight: 1
      reasons:
      - reason: 秒表
        sample: -1
    - weight: 1
      reasons:
      - reason: 摩擦acc
        sample: -1
  class_weights:
    正常: 1
    传感器错误: 1
    秒表: 1
    摩擦acc: 1
  lgb_params:
    n_estimators: 800
    num_leaves: 20
    max_depth: -1
    learning_rate: 0.05
    min_child_samples: 20
    min_split_gain: 0
    reg_lambda: 0
    reg_alpha: 0
    subsample: 0.8
    subsample_freq: 1
    feature_fraction: 0.7
    random_state: 42
    n_jobs: -1
  xgb_params:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    min_child_weight: 5
    gamma: 1
    reg_lambda: 5
    reg_alpha: 0.5
    subsample: 0.8
    colsample_bytree: 0.7
    eval_metric: mlogloss
    tree_method: hist
    random_state: 42
    n_jobs: -1
  rf_params:
    n_estimators: 100
    max_depth: 8
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: 0.8
augmentation:
  input_folders:
  - path: /Volumes/18555440521/fault/epump2_minimal_dataset/data_root/factory_raw/
    count: 5
  methods:
  - white_noise
  - random_crop
  - random_add_segment
  - random_amplitude
  - random_time_stretch
  - speed_perturb
  - time_frequency_mask
  - reverberation
  - add_noise
  output_dir: ./results/epump2_demo/dataset_csv
