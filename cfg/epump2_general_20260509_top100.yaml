line_name: epump2
feature_version: v5
model:
  model_name: general_20260509_top100
results_path: ./results/
data:
  line: epump2
  key_sns:
  - /Volumes/18555440521/fault/data_root/factory_raw/epump2/key_sns/
  - /Volumes/18555440521/fault/data_root/factory_raw/epump4/key_sns/
train:
  model_type: xgb
  train_mode: normal
  split_strategy: reference_in
  label_mapping:
    enable: true
    auto_mlabel: true
    groups:
    - reasons:
      - reason: 正常
        sample: 2000
      - reason: 干扰
        sample: -1
      - reason: 边界
        sample: -1
    - reasons:
      - reason: 杂音
        sample: -1
      - reason: 咬齿
        sample: -1
      - reason: 哒哒_咔咔
        sample: -1
    - reasons:
      - reason: 震颤
        sample: -1
      - reason: 马达
        sample: -1
    - reasons:
      - reason: 传感器错误
        sample: -1
    - reasons:
      - reason: 秒表
        sample: -1
    - reasons:
      - reason: 摩擦acc
        sample: -1
  seed_runs: 10
  feature_selection:
    selected_features_file: results/epump2_general_20260509_xgb/target_sweep_top100_current_20260518/feature_sets/top_100_target_rank.txt
  xgb_params:
    n_estimators: 320
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.8
    min_child_weight: 1
    gamma: 0.02
    reg_lambda: 1.5
  class_weights:
    震颤_马达: 3.0
    秒表: 2.0
